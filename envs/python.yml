# envs/python.yml — Python scripts environment
name: heterophy-python
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.11
  - biopython=1.83
  - ete3=3.1.3
  - matplotlib=3.8.0
  - scipy=1.11.0
  - numpy=1.26.0
  - pandas=2.1.0
  - jinja2=3.1.2
  - pip
  - pip:
    - plotly==5.18.0
